            - generic [ref=e76]:
              - heading "视觉设计" [level=1] [ref=e77]
              - paragraph [ref=e78]: Rokid AIUI 的视觉设计规范旨在为用户提供一致、沉浸、可读且适合设备侧落地的 AR 体验。AIUI 的视觉系统不是单纯的静态配色约定，而是基于宿主驱动的主题机制与 Design Tokens 建立的一套可复用视觉基础设施。
              - heading "核心原则" [level=2] [ref=e79]
              - list [ref=e80]:
                - listitem [ref=e81]:
                  - strong [ref=e82]: 清晰性
                  - text: ：在不同光照环境、透明显示背景和远近视距下保持可读性。
                - listitem [ref=e83]:
                  - strong [ref=e84]: 层次感
                  - text: ：通过 surface、边框、文字层级和间距建立稳定的信息结构。
                - listitem [ref=e85]:
                  - strong [ref=e86]: 品牌一致性
                  - text: ：延续 Rokid 在 AR 设备上的绿色主题语言，保证跨页面和跨组件体验一致。
                - listitem [ref=e87]:
                  - strong [ref=e88]: 简洁性
                  - text: ：避免占用用户主视角，不用过度装饰干扰真实世界观察。
                - listitem [ref=e89]:
                  - strong [ref=e90]: 可主题化
                  - text: ：视觉规范应通过 Design Tokens 落到主题层，便于宿主和应用侧统一接入与覆盖。
              - heading "主题机制" [level=2] [ref=e91]
              - paragraph [ref=e92]: AIUI 的视觉设计建议基于 CSS 自定义属性，也就是 Design Tokens 组织。一个主题本质上就是一份普通 CSS，用来定义布局、颜色、边框、圆角、间距以及组件默认样式。
              - list [ref=e93]:
                - listitem [ref=e94]:
                  - strong [ref=e95]: 宿主主题优先注入
                  - text: ：宿主会先注入主题，作为默认 token 层。
                - listitem [ref=e96]:
                  - strong [ref=e97]: 应用样式可继续覆盖
                  - text: ：应用仍然可以在
                  - code [ref=e98]: app.wxss
                  - text: 、页面样式和组件局部样式中覆盖变量。
                - listitem [ref=e99]:
                  - strong [ref=e100]: 主题结构应保持稳定
                  - text: ：不同主题尽量复用一致的 token 结构，这样组件切换主题时不需要改动标记结构。
              - heading "推荐主题" [level=2] [ref=e101]
              - paragraph [ref=e102]:
                - text: 对于 Rokid Glasses 的单绿色显示场景，推荐使用 Ink 内置主题
                - code [ref=e103]: yodaos-sprite-greenonly
                - text: 。它以黑色背景和绿色前景作为核心基调，目标是在单绿色显示硬件上保持足够的对比度、辨识度与舒适性。
              - heading "布局 Tokens" [level=2] [ref=e104]
              - paragraph [ref=e105]:
